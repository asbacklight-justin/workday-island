name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go tests and repository checks
    runs-on: macos-14
    steps:
      - name: Check out source
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Run tests
        run: go test ./...
      - name: Validate icon generation
        run: go run ./cmd/iconpack build/appicon.png "$RUNNER_TEMP/appicon.ico"
